# AgentGate GitHub Actions Example Workflow
#
# Copy this file to .github/workflows/agentgate.yml in your repository.
#
# Required secrets:
#   ANTHROPIC_API_KEY — used for LLM-powered analysis and adaptive attacks.
#
# Optional secrets / variables:
#   AGENT_URL — only needed when running a security scan against a live endpoint.
#
# See https://github.com/Elliot-Sones/AgentGate for full documentation.

name: AgentGate Security & Trust Scan

on:
  # Run trust scan on every PR to catch issues before merge
  pull_request:
    branches: [main, master]

  # Run the full scan on every push to main
  push:
    branches: [main, master]

  # Allow manual triggering from the Actions tab
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Trust scan on pull requests
  # Runs static + runtime trust analysis and reports results as a PR comment.
  # -------------------------------------------------------------------------
  trust-scan:
    name: Trust Scan (PR)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AgentGate trust scan
        id: agentgate
        uses: Elliot-Sones/AgentGate@main
        with:
          scan-type: trust
          source-dir: ./my-agent           # path to your agent directory
          manifest: ./my-agent/trust_manifest.yaml
          fail-on: manual_review           # block PRs with manual_review or worse
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      # Post a summary comment on the PR
      - name: Post scan summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const verdict = '${{ steps.agentgate.outputs.verdict }}';
            const count   = '${{ steps.agentgate.outputs.findings-count }}';
            const report  = '${{ steps.agentgate.outputs.report-path }}';

            const emoji = verdict === 'allow'
              ? '✅'
              : verdict === 'allow_with_warnings'
              ? '⚠️'
              : verdict === 'manual_review'
              ? '🔍'
              : '🚫';

            const body = [
              `## ${emoji} AgentGate Trust Scan`,
              '',
              `| Field | Value |`,
              `|-------|-------|`,
              `| Verdict | \`${verdict}\` |`,
              `| Findings | ${count} |`,
              `| Report | ${report || 'see uploaded artifact'} |`,
              '',
              '_Full report uploaded as a workflow artifact._',
            ].join('\n');

            await github.rest.issues.createComment({
              owner:    context.repo.owner,
              repo:     context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  # -------------------------------------------------------------------------
  # Job 2: Full security + trust scan on push to main
  # -------------------------------------------------------------------------
  full-scan:
    name: Full Scan (main)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---- Trust scan ----
      - name: Run AgentGate trust scan
        id: trust
        uses: Elliot-Sones/AgentGate@main
        with:
          scan-type: trust
          source-dir: ./my-agent
          manifest: ./my-agent/trust_manifest.yaml
          fail-on: manual_review
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      # ---- Security scan (requires a live agent endpoint) ----
      # Uncomment and configure if you have a staging deployment URL.
      #
      # - name: Run AgentGate security scan
      #   id: security
      #   uses: Elliot-Sones/AgentGate@main
      #   with:
      #     scan-type: security
      #     agent-url: ${{ vars.AGENT_URL }}
      #     anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Print scan outputs
        if: always()
        run: |
          echo "Trust verdict:      ${{ steps.trust.outputs.verdict }}"
          echo "Trust findings:     ${{ steps.trust.outputs.findings-count }}"
          echo "Trust report path:  ${{ steps.trust.outputs.report-path }}"

  # -------------------------------------------------------------------------
  # Job 3: Scheduled nightly full scan
  # Keeps an eye on agents that don't change often but may drift in behaviour.
  # -------------------------------------------------------------------------
  nightly-scan:
    name: Nightly Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run AgentGate trust scan (strict)
        uses: Elliot-Sones/AgentGate@main
        with:
          scan-type: trust
          source-dir: ./my-agent
          manifest: ./my-agent/trust_manifest.yaml
          fail-on: allow_with_warnings   # stricter threshold for nightly runs
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
